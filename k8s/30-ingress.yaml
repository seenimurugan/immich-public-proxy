# Tailscale Funnel ingress for seeni-photos (public gallery).
# host: seeni-photos  → https://seeni-photos.stoat-perch.ts.net (Funnel = public)
# Backend: public-inject-proxy (nginx that injects Umami tracking script).
# The main Immich instance is NOT touched and remains tailnet-private.
# The private 'immich' ingress (tailnet-only) is also NOT modified here.
# NOTE: tailscale.com/funnel: "true" requires a nodeAttrs funnel grant
# in the Tailscale admin console (manual step — outside this repo).
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: immich-public-proxy
  namespace: ${NAMESPACE}
  annotations:
    tailscale.com/funnel: "true"
spec:
  ingressClassName: tailscale
  rules:
    - host: seeni-photos
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: public-inject-proxy
                port:
                  number: 80
  tls:
    - hosts:
        - seeni-photos
